<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project Purple home feed." />
    <title>Project Purple • Home</title>
    <link rel="stylesheet" href="../css/app.css" />
  </head>
  <body>
    <div class="app-shell home-shell">
      <aside class="side-rail">
        <div class="rail-brand">
          <span class="rail-logo">V</span>
        </div>

        <nav class="rail-nav">
          <a class="rail-link is-active" href="#">Home</a>
          <a class="rail-link" href="#">Discover</a>
          <a class="rail-link" href="#">Collections</a>
          <a class="rail-link" href="#">Following</a>
          <a class="rail-link" href="#">Vault</a>
          <a class="rail-link" href="#">Studio</a>
        </nav>
      </aside>

      <div class="app-main">
        <header class="topbar">
          <div class="topbar-left">
            <a class="brand-wordmark" href="#">VeuMe</a>
          </div>

          <div class="topbar-center">
            <label class="search-bar">
              <input type="search" placeholder="Search creators, videos, collections..." />
            </label>
          </div>

          <div class="topbar-right">
            <button class="btn btn-secondary">Upload</button>
            <button class="avatar">VM</button>
          </div>
        </header>

        <main class="page-content home-page">
          <section class="hero-feature card">
            <div class="hero-copy">
              <p class="page-kicker">Featured Creator</p>
              <h1 class="page-title">Aiden Marlowe</h1>
              <p class="page-subtitle">
                Cinematic storytelling and immersive documentary experiences.
              </p>

              <div class="hero-actions">
                <button class="btn btn-primary">Follow Creator</button>
                <button class="btn btn-secondary">View Profile</button>
              </div>
            </div>

            <div class="hero-preview">
              <div class="player-shell">
                <button class="play-button">▶</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
